version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
    groups:
      # Framework + runtime move together; keep them in one PR.
      next-react:
        patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      # Everything else: batch patch + minor so majors surface as their own PRs.
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Held back deliberately (major jumps entangled with the toolchain).
      # Remove these once eslint-config-next + type-check toolchain support them.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Track the Node runtime, not the newest @types/node.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
