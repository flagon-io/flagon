name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL_APP: postgres://flagon_app:flagon_app@localhost:5432/flagon
  DATABASE_URL_OWNER: postgres://flagon_owner:flagon_owner@localhost:5432/flagon

jobs:
  build:
    name: Lint, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: flagon_owner
          POSTGRES_PASSWORD: flagon_owner
          POSTGRES_DB: flagon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flagon_owner -d flagon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Provision restricted app role
        run: npm run db:provision

      - name: Migrate
        run: npm run db:migrate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
